:root {
  --bg: #ffffff;
  --surface: #f4f4f4;
  --border: #bbbbbb;
  --text: #111111;
  --muted: #666666;
  --highlight: #000000;
  --highlight-bg: #e8e8e8;
  --assigned: #111111;
  --assigned-bg: #e0e0e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
  gap: 1.5rem;
}

header { text-align: center; }
.title {
  font-size: 0.68rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.35rem;
}
.subtitle { font-size: 1.1rem; font-weight: 700; }

.controller-wrap { width: 100%; max-width: 480px; }
.controller-svg { width: 100%; height: auto; display: block; overflow: visible; }

.spot { cursor: pointer; }
.spot .body {
  fill: #ffffff;
  stroke: #888888;
  stroke-width: 1.5;
  transition: fill 0.12s, stroke 0.12s;
}
.spot:hover .body { fill: #e0e0e0; stroke: #000; }
.spot.assigned .body { fill: #e0e0e0; stroke: #000; stroke-width: 2; }
.spot.active .body { fill: #cccccc; stroke: #000; stroke-width: 2; }
.spot .lbl {
  fill: #444444;
  font-family: monospace;
  font-size: 8.5px;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.spot:hover .lbl, .spot.active .lbl, .spot.assigned .lbl { fill: #000; }

.map-wrap { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 0.4rem; }
.map-section-title {
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0.2rem;
}
.map-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.6rem 1rem;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
}
.map-row:hover { border-color: #000; background: #ebebeb; }
.map-row.active { border-color: #000; background: #e0e0e0; }
.map-row.assigned { border-color: #333; }
.map-btn {
  font-family: monospace;
  font-size: 0.7rem;
  color: var(--muted);
  width: 78px;
  flex-shrink: 0;
}
.map-arrow { color: var(--border); font-size: 0.7rem; flex-shrink: 0; }
.map-action { flex: 1; font-size: 0.85rem; }
.map-action.none { color: var(--muted); font-style: italic; }
.map-tap { font-family: monospace; font-size: 0.58rem; color: var(--muted); flex-shrink: 0; }

.btn-row { display: flex; gap: 0.7rem; width: 100%; max-width: 460px; }
.ui-btn {

  color: var(--text);

  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
